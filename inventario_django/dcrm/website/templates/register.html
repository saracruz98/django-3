{% extends 'base.html' %}

{% block content %}
<!-- Contenedor principal: centra la tarjeta de registro vertical y horizontalmente -->
<div class="row min-vh-100 align-items-center justify-content-center" style="margin-top: -60px;">
  <div class="col-md-5">
    <!-- Tarjeta de registro con estilo premium y animación de entrada -->
    <div class="premium-card animate-fade-in shadow-sm">
      
      <!-- Encabezado de la tarjeta: Icono, título y subtítulo -->
      <div class="text-center mb-4">
        <div style="width:56px;height:56px;border-radius:16px;
             background:linear-gradient(135deg,#059669,#047857);
             display:flex;align-items:center;justify-content:center;
             margin:0 auto 1rem;">
          <!-- Icono de usuario SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 16 16">
            <path d="M6 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H1s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C9.516 10.68 8.289 10 6 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
            <path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5"/>
          </svg>
        </div>
        <h2 class="fw-bold mb-1">Crear cuenta</h2>
        <p class="text-muted small">Únete en segundos</p>
      </div>

      <!-- Formulario de registro -->
      <form method="POST" action="{% url 'register' %}">
        <!-- Token de seguridad obligatorio en formularios de Django -->
        {% csrf_token %}

        <!-- Campo: Nombre de Usuario -->
        <div class="mb-3">
          <label class="form-label">Nombre de Usuario</label>
          <input type="text" name="username" class="form-control form-control-custom"
                 placeholder="Tu nombre de usuario" required autofocus>
        </div>

        <!-- Campo: Correo Electrónico -->
        <div class="mb-3">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" name="email" class="form-control form-control-custom"
                 placeholder="tu@correo.com" required>
        </div>

        <!-- Campo: Contraseña -->
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <div class="input-wrap">
            <input type="password" name="password" id="pw1" class="form-control form-control-custom"
                   placeholder="Contraseña" required>
            <!-- Botón para alternar la visibilidad de la contraseña -->
            <span class="toggle-pw" id="togglePw1">👁</span>
          </div>
        </div>

        <!-- Botón de envío del formulario -->
        <button type="submit" class="btn-premium mb-3">Crear mi cuenta</button>
        
        <!-- Enlace para usuarios que ya tienen cuenta -->
        <div class="text-center">
          <a href="{% url 'home' %}" class="small text-decoration-none text-muted">
            ¿Ya tienes cuenta? <span style="color:var(--primary-color);font-weight:600;">Inicia sesión</span>
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  // Función para alternar la visibilidad de la contraseña entre texto oculto y visible
  function makeToggle(btnId, inputId) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    
    // Al hacer clic en el botón, cambia el tipo de input y el icono correspondiente
    btn.addEventListener('click', function() {
      const inp = document.getElementById(inputId);
      inp.type = inp.type === 'text' ? 'password' : 'text';
      this.textContent = inp.type === 'text' ? '🙈' : '👁';
    });
  }
  
  // Inicializa el toggle para el campo de contraseña
  makeToggle('togglePw1', 'pw1');
</script>
{% endblock %}
