{% extends 'base.html' %}
{% load static %}

{% block title %}Panel de Cliente{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 800px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h3 class="card-title mb-4 text-center">Bienvenido, {{ user.username }}</h3>
      <p><strong>Correo:</strong> {{ user.email }}</p>
      <p><strong>Teléfono:</strong> {{ user.telefono }}</p>
      <p><strong>Rol:</strong> {{ user.get_rol_display }}</p>
      <a href="{% url 'logout' %}" class="btn btn-outline-danger mt-3">Cerrar sesión</a>
    </div>
  </div>
</div>
{% endblock %}
