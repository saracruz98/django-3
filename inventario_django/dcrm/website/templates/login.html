{% extends 'base.html' %}
{% load static %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
  <h2 class="mb-4 text-center">Iniciar Sesión</h2>
  <form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-3">
      <label for="id_username" class="form-label">Usuario</label>
      <input type="text" name="username" maxlength="150" autofocus required class="form-control" id="id_username" placeholder="Tu usuario">
    </div>
    <div class="mb-3">
      <label for="id_password" class="form-label">Contraseña</label>
      <input type="password" name="password" required class="form-control" id="id_password" placeholder="Contraseña">
    </div>
    <button type="submit" class="btn btn-primary w-100">Entrar</button>
  </form>
  <p class="mt-3 text-center">
    ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a>
  </p>
</div>
{% endblock %}
