<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel del Personal</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'static/css/bootstrap.min.css' %}">
</head>
<body class="bg-light">
<div class="container-fluid mt-4">
  <div class="row">
    <!-- Sidebar -->
    <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
      <div class="position-sticky pt-3">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">
              <span data-feather="home"></span>
              Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <span data-feather="file"></span>
              Gestión de Inventario
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <span data-feather="shopping-cart"></span>
              Reportes de Ventas
            </a>
          </li>
        </ul>
        <hr>
        <a class="nav-link" href="{% url 'logout' %}"><span data-feather="log-out"></span> Cerrar sesión</a>
      </div>
    </nav>

    <!-- Main content -->
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
      <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
        <h1 class="h2">Panel de Personal</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
          <div class="btn-group me-2">
            <span class="badge bg-primary">Usuario: {{ user.username }}</span>
            <span class="badge bg-secondary ms-2">Rol: {{ user.get_rol_display }}</span>
          </div>
        </div>
      </div>
      <p>Bienvenido, {{ user.username }}. Desde aquí puedes gestionar el inventario, revisar reportes y configurar el sistema.</p>
    </main>
  </div>
</div>
</body>
</html>
